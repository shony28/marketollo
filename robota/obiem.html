<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Обмір деревини</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #ffffff;
    --green: #3fb950;
    --green-dim: #1a4028;
    --amber: #d29922;
    --amber-dim: #3d2e0a;
    --red: #f85149;
    --red-dim: #3d1515;
    --blue: #58a6ff;
    --blue-dim: #0d2340;
    --text: #ffffff;
    --text-muted: #7d8590;
    --key-bg: #21262d;
    --key-active: #388bfd;
    --key-border: #ffffff;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    user-select: none;
  }

  /* ══════════════════ REGISTRATION SCREEN ══════════════════ */
  #screen-reg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
    gap: 0;
  }


  .reg-logo-img {
    height: 52px;
    width: auto;
    margin-bottom: 8px;
  }

  .reg-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    text-align: center;
    margin-bottom: 48px;
    line-height: 1.2;
  }

  .reg-title span { color: var(--green); }

  .reg-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    align-self: flex-start;
    width: 100%;
    max-width: 340px;
  }

  .reg-input-wrap {
    width: 100%;
    max-width: 340px;
    position: relative;
    margin-bottom: 20px;
  }

  .reg-input {
    width: 100%;
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 3px;
    text-align: center;
    outline: none;
    transition: border-color .2s;
  }

  .reg-input:focus { border-color: var(--green); }
  .reg-input::placeholder { color: var(--border); font-size: 18px; letter-spacing: 1px; }

  .reg-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 32px;
    max-width: 280px;
    line-height: 1.6;
  }

  .btn-start {
    width: 100%;
    max-width: 340px;
    padding: 20px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #0d1117;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform .1s, opacity .2s;
    box-shadow: 0 4px 24px rgba(63,185,80,.35);
  }

  .btn-start:active { transform: scale(.97); opacity: .85; }

  /* ══════════════════ MAIN SCREEN ══════════════════ */
  #screen-main {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-car {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .car-badge {
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
  }

  .car-number {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 2px;
  }

  .btn-finish {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--red);
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s;
  }

  .btn-finish:active { background: var(--red); color: #fff; }

  /* Stats bar */
  .stats-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 3px 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }

  .stat-value span { font-size: 12px; color: var(--text-muted); margin-left: 2px; }

  /* Input area */
  .input-area {
    padding: 5px 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .field-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding-left: 2px;
  }

  .field-input {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 2px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 48px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    width: 100%;
    outline: none;
    caret-color: transparent;
  }

  .field-input.active {
    border-color: var(--blue);
    background: var(--blue-dim);
    color: #fff;
  }

  .field-input.has-value { color: var(--green); }
  .field-input.active.has-value { color: #fff; }

  .field-unit {
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 1px;
  }

  .btn-add {
    align-self: flex-end;
    margin-bottom: 0;
    width: 70px;
    height: 68px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: transform .1s;
    box-shadow: 0 2px 12px rgba(63,185,80,.3);
    flex-shrink: 0;
  }

  .btn-add:active { transform: scale(.93); }

  .btn-add svg { width: 24px; height: 24px; }

  .btn-add-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #0d1117;
    letter-spacing: 1px;
  }

  /* Recent log */
  .recent-section {
    flex: 1;
    padding: 0 16px 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .recent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .recent-title {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .btn-journal {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 1px;
    transition: color .2s, border-color .2s;
  }

  .btn-journal:active { color: var(--blue); border-color: var(--blue); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    overflow: hidden;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-num {
    font-size: 14px;
    color: var(--text-muted);
    min-width: 24px;
  }

  .log-data {
    flex: 1;
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .log-field {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .log-field-label {
    font-size: 8px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .log-field-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .log-vol {
    margin-left: auto;
    text-align: right;
  }

  .log-vol-label { font-size: 8px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .log-vol-val { font-size: 20px; font-weight: 900; color: var(--amber); }

  .log-action {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-delete {
    width: 32px;
    height: 32px;
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }

  .btn-delete:active { background: var(--red); }
  .btn-delete svg { width: 15px; height: 15px; }

  .synced-icon {
    width: 32px;
    height: 32px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .synced-icon svg { width: 15px; height: 15px; }

  /* Sync button */
  .sync-bar {
    padding: 8px 16px;
    flex-shrink: 0;
  }

.btn-sync {
  padding: 8px 10px;
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-radius: var(--radius);
  font-family: 'Unbounded', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background .2s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  align-self: center;
}

  .btn-sync:active { background: var(--blue); color: #0d1117; }
  .btn-sync.syncing { opacity: .6; pointer-events: none; }

  /* ══════════════════ CUSTOM KEYBOARD ══════════════════ */
  .keyboard {
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 10px 10px 14px;
    flex-shrink: 0;
  }

  .keyboard-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .key {
    height: 64px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    transition: background .1s, transform .08s;
    position: relative;
    overflow: hidden;
  }

  .key::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,.08);
    opacity: 0;
    transition: opacity .1s;
  }

  .key:active::after { opacity: 1; }
  .key:active { transform: scale(.94); background: var(--key-active); border-color: var(--key-active); }

  .key-clear {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
    font-size: 14px;
    letter-spacing: 1px;
    font-family: 'Unbounded', sans-serif;
  }

  .key-clear:active { background: var(--red); color: #fff; }

  .key-zero { grid-column: span 2; }

  .key-dot {
    font-size: 36px;
    padding-bottom: 8px;
  }

  /* ══════════════════ MODAL ══════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 2px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 75dvh;
    display: flex;
    flex-direction: column;
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
  }

  .btn-close {
    width: 32px;
    height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    font-family: monospace;
    transition: color .2s;
  }

  .btn-close:active { color: var(--text); }

  .modal-body {
    overflow-y: auto;
    padding: 12px 16px;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .modal-log-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-50%);
  }

  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Confirm modal */
  .confirm-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    z-index: 150;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .confirm-modal.open { display: flex; }

  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: popIn .2s ease;
  }

  @keyframes popIn {
    from { transform: scale(.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .confirm-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }

  .confirm-msg {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  .confirm-actions {
    display: flex;
    gap: 10px;
  }

  .confirm-btn {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity .15s;
  }

  .confirm-btn:active { opacity: .75; }
  .confirm-btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .confirm-btn-ok { background: var(--red); color: #fff; }
  .confirm-btn-green { background: var(--green); color: #0d1117; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* GAS URL config */
  .config-section {
    margin-top: 32px;
    width: 100%;
    max-width: 340px;
  }

  .config-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    width: 100%;
    letter-spacing: 1px;
    transition: color .2s, border-color .2s;
  }

  .config-toggle:active { color: var(--blue); border-color: var(--blue); }

  .config-body {
    display: none;
    padding-top: 12px;
    flex-direction: column;
    gap: 8px;
  }

  .config-body.open { display: flex; }

  .config-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .config-input:focus { border-color: var(--blue); }

  .config-save {
    background: var(--blue-dim);
    border: 1px solid var(--blue);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--blue);
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s;
  }

  .config-save:active { background: var(--blue); color: #0d1117; }

  .key-add {
  background: var(--green);
  border-color: var(--green);
  color: #0d1117;
  font-size: 30px;
  font-weight: 900;
}

.key-add:active {
  background: #2ea043;
  border-color: #2ea043;
}

.btn-journal-side {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 12px;
  height: 36px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  transition: background .15s;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.btn-journal-side:active {
  background: var(--border);
  color: var(--text);
}

.sort-c-badge {
  display: inline-block;
  background: var(--amber-dim);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-size: 11px;
  font-weight: 700;
  border-radius: 4px;
  padding: 1px 5px;
  letter-spacing: 1px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<!-- ══════ REGISTRATION SCREEN ══════ -->
<div id="screen-reg">
  <img src="https://klen.ua/frontAssets/assets/img/logo-light.svg" class="reg-logo-img" alt="К'Лен" />
  <div class="reg-title">Замір<br><span>деревини</span></div>

  <div class="reg-label">Номер</div>
  <div class="reg-input-wrap">
    <input
      type="text"
      id="car-input"
      class="reg-input"
      placeholder="Номер авто"
      maxlength="12"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
  </div>

  <div class="reg-label">Лісгосп / організація</div>
  <div class="reg-input-wrap">
    <select id="org-select" class="reg-input" style="font-size:16px; letter-spacing:1px; cursor:pointer;">
      <option value="">— оберіть —</option>
      <option value="Центральний ЛО">Центральний ЛО</option>
      <option value="Подільський ЛО">Подільський ЛО</option>
      <option value="Столичний ЛО">Столичний ЛО</option>
      <option value="Берегівське ліс.">Берегівське ліс.</option>
      <option value="Хустське ліс.">Хустське ліс.</option>
      <option value="Інше">Інше</option>
    </select>
  </div>

  <div class="reg-label">Порода деревини</div>
  <div class="reg-input-wrap">
    <select id="wood-select" class="reg-input" style="font-size:20px; letter-spacing:1px; cursor:pointer;">
      <option value="">— оберіть —</option>
      <option value="Бук">Бук</option>
      <option value="Дуб">Дуб</option>
    </select>
  </div>

  <button class="btn-start" onclick="startSession()">ПОЧАТИ РОБОТУ</button>

</div>

<!-- ══════ MAIN SCREEN ══════ -->
<div id="screen-main">

  <!-- Header -->
  <div class="header">
    <div class="header-car">
      <div class="car-badge">🚛 №</div>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const STATE_KEY = 'lisOblik_state';
let state = {
  carNumber: '',
  entries: [],        // {id, length, diameter, volume, synced, sortC}
  nextId: 1,
  currentLength: '',   
  currentDiameter: ''  
};

let activeField = 'diameter'; // 'length' | 'diameter'

// ══════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const s = localStorage.getItem(STATE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

function getGasUrl() {
  return GAS_URL;
}



// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadState();

  if (state.carNumber) {
    showMainScreen();
  } else {
    document.getElementById('screen-reg').style.display = 'flex';
  }
});

// ══════════════════════════════════════════
//  REGISTRATION
// ══════════════════════════════════════════
function startSession() {
  const carInput = document.getElementById('car-input');
  const orgSelect = document.getElementById('org-select');
  const woodSelect = document.getElementById('wood-select');
  const car = carInput.value.trim().toUpperCase();

  if (!car) { carInput.style.borderColor = 'var(--red)'; return; }
  if (!orgSelect.value) { orgSelect.style.borderColor = 'var(--red)'; return; }
  if (!woodSelect.value) { woodSelect.style.borderColor = 'var(--red)'; return; }

  state.carNumber = car;
  state.organization = orgSelect.value;
  state.woodType = woodSelect.value;
  state.entries = [];
  state.nextId = 1;
  saveState();
  showMainScreen();
}



// ══════════════════════════════════════════
//  SCREEN MANAGEMENT
// ══════════════════════════════════════════
function showMainScreen() {
  document.getElementById('screen-reg').style.display = 'none';
  const main = document.getElementById('screen-main');
  main.style.display = 'flex';
  document.getElementById('display-car-number').textContent = state.carNumber;

  // Відновити збережені значення полів
  const lEl = document.getElementById('field-length');
  const dEl = document.getElementById('field-diameter');
  if (state.currentLength) {
    lEl.value = state.currentLength;
    lEl.classList.toggle('has-value', true);
  }
  if (state.currentDiameter) {
    dEl.value = state.currentDiameter;
    dEl.classList.toggle('has-value', true);
  }

  setFocus('diameter');
  renderAll();
}

// ══════════════════════════════════════════
//  KEYBOARD LOGIC
// ══════════════════════════════════════════
function setFocus(field) {
  const lEl = document.getElementById('field-length');
  const dEl = document.getElementById('field-diameter');

  // Якщо поле вже активне — очищаємо його
  if (activeField === field) {
    const el = field === 'length' ? lEl : dEl;
    el.value = '';
    el.classList.remove('has-value');
    if (field === 'length') state.currentLength = '';
    else state.currentDiameter = '';
    saveState();
  }

  activeField = field;
  lEl.classList.toggle('active', field === 'length');
  dEl.classList.toggle('active', field === 'diameter');
  lEl.classList.toggle('has-value', lEl.value.length > 0);
  dEl.classList.toggle('has-value', dEl.value.length > 0);
}

function keyPress(key) {
  const el = document.getElementById(activeField === 'length' ? 'field-length' : 'field-diameter');
  let val = el.value;

  if (key === 'C') {
    el.value = '';
    el.classList.remove('has-value');
    if (activeField === 'length') state.currentLength = '';
    else state.currentDiameter = '';
    saveState();
    return;
  }

  if (key === '.' && val.includes('.')) return;
  if (val.length >= 8) return;
  if (val === '0' && key !== '.') return;

  val += key;
  el.value = val;
  el.classList.toggle('has-value', val.length > 0);

  if (activeField === 'length') state.currentLength = val;
  else state.currentDiameter = val;
  saveState();
}

// ══════════════════════════════════════════
//  ADD ENTRY
// ══════════════════════════════════════════
function calcVolume(lengthCm, diamCm) {
  const L = parseFloat(lengthCm) / 100;
  const D = Math.round(parseFloat(diamCm));

  // Вибираємо таблицю залежно від породи
  const table = (state.woodType === 'Бук') ? VOLUME_TABLE_BUK : VOLUME_TABLE;

  const row = table[D];

  if (!row) {
    const r = (diamCm / 100) / 2;
    return Math.PI * r * r * L;
  }

  if (L <= TABLE_LENGTHS[0]) return row[0] ?? 0;
  if (L >= TABLE_LENGTHS[TABLE_LENGTHS.length - 1]) return row[row.length - 1] ?? 0;

  let i = 0;
  while (i < TABLE_LENGTHS.length - 1 && TABLE_LENGTHS[i + 1] < L) i++;

  const L0 = TABLE_LENGTHS[i];
  const L1 = TABLE_LENGTHS[i + 1];
  const V0 = row[i]   ?? 0;
  const V1 = row[i+1] ?? 0;

  const t = (L - L0) / (L1 - L0);
  return V0 + t * (V1 - V0);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.18);
    osc.onended = () => ctx.close();
  } catch(e) {}
}

function addEntry() {
  const lEl = document.getElementById('field-length');
  const dEl = document.getElementById('field-diameter');
  const L = parseFloat(lEl.value);
  const D = parseFloat(dEl.value);

  if (!L || !D || isNaN(L) || isNaN(D)) {
    showToast('Введіть довжину та діаметр!', 'error');
    return;
  }

  const V = calcVolume(L, D);
  const chkSortC = document.getElementById('chk-sort-c');
  const entry = {
    id: state.nextId++,
    length: L,
    diameter: D,
    volume: V,
    synced: false,
    sortC: chkSortC.checked
  };
  state.entries.push(entry);

  dEl.value = '';
  dEl.classList.remove('has-value');
  state.currentDiameter = '';
  chkSortC.checked = false;  // скидаємо чекбокс
  // Довжина залишається — не очищаємо state.currentLength
  saveState();

  playBeep(); // ← звук підтвердження

  setFocus('diameter');
  renderAll();
  showToast(`Колода #${entry.id} додана${entry.sortC ? ' [С]' : ''}`, 'success');
}
// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderAll() {
  renderStats();
  renderRecent();
}

function renderStats() {
  const count = state.entries.length;
  const vol = state.entries.reduce((s, e) => s + e.volume, 0);
  document.getElementById('stat-count').textContent = count;
  document.getElementById('stat-volume').innerHTML =
    `${vol.toFixed(3)} <span>м³</span>`;
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  const last3 = state.entries.slice(-2).reverse();
  if (!last3.length) {
    list.innerHTML = '<div class="empty-state">Немає записів</div>';
    return;
  }
  list.innerHTML = last3.map(e => logItemHTML(e)).join('');
}

function logItemHTML(e, modal = false) {
  const cls = modal ? 'modal-log-item' : 'log-item';
  const action = e.synced
    ? `<div class="synced-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
       </div>`
    : `<button class="btn-delete" onclick="deleteEntry(${e.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
       </button>`;

  return `<div class="${cls}">
    <div class="log-num">#${e.id}${e.sortC ? '<br><span class="sort-c-badge">C</span>' : ''}</div>
    <div class="log-data">
      <div class="log-field">
        <div class="log-field-label">Довжина</div>
        <div class="log-field-val">${e.length}</div>
      </div>
      <div class="log-field">
        <div class="log-field-label">Діаметр</div>
        <div class="log-field-val">${e.diameter}</div>
      </div>
      <div class="log-vol">
        <div class="log-vol-label">Об'єм м³</div>
        <div class="log-vol-val">${e.volume.toFixed(3)}</div>
      </div>
    </div>
    <div class="log-action">${action}</div>
  </div>`;
}

function deleteEntry(id) {
  const idx = state.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  state.entries.splice(idx, 1);
  saveState();
  renderAll();
  // refresh journal if open
  if (document.getElementById('journal-modal').classList.contains('open')) {
    renderJournal();
  }
}

// ══════════════════════════════════════════
//  JOURNAL
// ══════════════════════════════════════════
function openJournal() {
  renderJournal();
  document.getElementById('journal-modal').classList.add('open');
}

function closeJournal() {
  document.getElementById('journal-modal').classList.remove('open');
}

function closeJournalOnOverlay(e) {
  if (e.target === document.getElementById('journal-modal')) closeJournal();
}

function renderJournal() {
  const body = document.getElementById('journal-body');
  if (!state.entries.length) {
    body.innerHTML = '<div class="empty-state">Журнал порожній</div>';
    return;
  }
  body.innerHTML = [...state.entries].reverse().map(e => logItemHTML(e, true)).join('');
}

// ══════════════════════════════════════════
//  SYNC
// ══════════════════════════════════════════
async function syncData() {
  const gasUrl = getGasUrl();
  if (!gasUrl) {
    showToast('Спочатку вкажіть GAS URL в налаштуваннях!', 'error');
    return;
  }
  const unsynced = state.entries.filter(e => !e.synced);
  if (!unsynced.length) {
    showToast('Немає нових записів для синхронізації', 'success');
    return;
  }

  const btn = document.getElementById('btn-sync');
  btn.classList.add('syncing');
  btn.innerHTML = '<span>⏳ СИНХ...</span>';

  try {
    const payload = {
      action: 'sync',
      carNumber: state.carNumber,
      entries: unsynced.map(e => ({
        id: e.id,
        length: e.length,
        diameter: e.diameter,
        volume: e.volume,
        sortC: e.sortC || false
      }))
    };

    const res = await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // no-cors mode → mark all as synced optimistically
    unsynced.forEach(e => {
      const entry = state.entries.find(x => x.id === e.id);
      if (entry) entry.synced = true;
    });
    saveState();
    renderAll();
    showToast(`${unsynced.length} записів синхронізовано ✓`, 'success');

  } catch(err) {
    showToast('Помилка синхронізації: ' + err.message, 'error');
  } finally {
    btn.classList.remove('syncing');
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg> СИНХ.`;
  }
}

// ══════════════════════════════════════════
//  FINISH
// ══════════════════════════════════════════
function askFinish() {
  const unsynced = state.entries.filter(e => !e.synced).length;
  const msg = unsynced > 0
    ? `Є ${unsynced} несинхронізованих записів.\nСпочатку рекомендується синхронізувати. Все одно завершити?`
    : `Всього колод: ${state.entries.length}\nЗагальний об'єм: ${state.entries.reduce((s,e)=>s+e.volume,0).toFixed(3)} м³\n\nЗавершити машину та очистити?`;

  showConfirm(
    'ЗАВЕРШИТИ МАШИНУ?',
    msg,
    unsynced > 0 ? 'var(--red)' : 'var(--green)',
    finishSession
  );
}

let _finishing = false;
async function finishSession() {
  if (_finishing) return;
  _finishing = true;
  closeConfirm();

  const loadingEl = document.getElementById('screen-loading');
  loadingEl.style.display = 'flex';

  const gasUrl = getGasUrl();

  if (gasUrl) {
    const unsynced = state.entries.filter(e => !e.synced);
    try {
      await fetch(gasUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'finish',
          carNumber: state.carNumber,
          organization: state.organization || '',
          woodType: state.woodType || '',
          entries: unsynced.map(e => ({
            id: e.id, length: e.length, diameter: e.diameter, volume: e.volume, sortC: e.sortC || false
          }))
        })
      });
    } catch(e) {}
  }

  state = { carNumber: '', entries: [], nextId: 1, currentLength: '', currentDiameter: '' };
  saveState();

  loadingEl.style.display = 'none';
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('car-input').value = '';
  document.getElementById('org-select').value = '';
  document.getElementById('wood-select').value = '';
  document.getElementById('screen-reg').style.display = 'flex';
  _finishing = false;
  showToast('Машину завершено. Дякуємо!', 'success');
}

// ══════════════════════════════════════════
//  CONFIRM MODAL
// ══════════════════════════════════════════
let _confirmCallback = null;

function showConfirm(title, msg, color, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const okBtn = document.getElementById('confirm-ok-btn');
  okBtn.style.background = color || 'var(--red)';
  _confirmCallback = cb;
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
  _confirmCallback = null;
}

document.getElementById('confirm-ok-btn').addEventListener('click', () => {
  if (_confirmCallback) {
    const cb = _confirmCallback;
    _confirmCallback = null; // ← скидаємо ОДРАЗУ, до виклику
    cb();
  }
});

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  clearTimeout(_toastTimer);
  setTimeout(() => el.classList.add('show'), 10);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}


// Prevent keyboard on touch for readonly inputs
document.querySelectorAll('.field-input').forEach(el => {
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    const field = el.id === 'field-length' ? 'length' : 'diameter';
    setFocus(field);
  }, { passive: false });

  el.addEventListener('mousedown', e => {
    e.preventDefault();
    const field = el.id === 'field-length' ? 'length' : 'diameter';
    setFocus(field);
  });
});

// ══════════════════════════════════════════
//  KEYBOARD INPUT (ПК)
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  // Працює лише коли відкритий головний екран
  if (document.getElementById('screen-main').style.display === 'none') return;
  // Ігноруємо якщо фокус на текстовому полі (реєстрація, налаштування тощо)
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) &&
      !e.target.classList.contains('field-input')) return;

  if (e.key >= '0' && e.key <= '9') { keyPress(e.key); return; }
  if (e.key === '.' || e.key === ',') { keyPress('.'); return; }
  if (e.key === 'Backspace') {
    const el = document.getElementById(activeField === 'length' ? 'field-length' : 'field-diameter');
    el.value = el.value.slice(0, -1);
    el.classList.toggle('has-value', el.value.length > 0);
    if (activeField === 'length') state.currentLength = el.value;
    else state.currentDiameter = el.value;
    saveState();
    return;
  }
  if (e.key === 'Delete' || e.key === 'Escape') { keyPress('C'); return; }
  if (e.key === 'Tab') {
    e.preventDefault();
    setFocus(activeField === 'length' ? 'diameter' : 'length');
    return;
  }
  if (e.key === 'Enter') { addEntry(); return; }
});
