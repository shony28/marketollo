<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            padding: 20px;
        }

        #reader {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #torch-btn {
            background-color: #6c757d;
            display: none; /* прихована поки сканер не запущено */
        }

        #torch-btn.active {
            background-color: #ffc107;
            color: #212529;
        }

        #torch-btn:disabled {
            background-color: #ccc;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 8px;
            word-break: break-all;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2>QR/Bar-code Scanner</h2>

    <div id="reader"></div>

    <div class="controls">
        <button id="start-btn">▶ Запустити сканер</button>
        <button id="torch-btn" disabled>🔦 Ліхтарик</button>
        <button id="stop-btn" disabled>⏹ Зупинити</button>
    </div>

    <div id="result">Результат з'явиться тут</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const startBtn  = document.getElementById('start-btn');
        const stopBtn   = document.getElementById('stop-btn');
        const torchBtn  = document.getElementById('torch-btn');
        const resultDiv = document.getElementById('result');

        let torchOn = false;
        let torchSupported = false;
        let videoTrack = null;

        const qrConfig = {
            fps: 30,
            qrbox: { width: 250, height: 250 },
            videoConstraints: {
                facingMode: "environment",
                frameRate: { ideal: 30, max: 60 }
            }
        };

        const onSuccess = (decodedText) => {
            resultDiv.innerText = `✅ Знайдено: ${decodedText}`;
            resultDiv.style.color = "green";
            stopScanner();
        };

        const onError = () => {};

        async function startScanner() {
            try {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                resultDiv.style.color = "";
                resultDiv.innerText = "Камера запускається...";

                await html5QrCode.start(
                    { facingMode: "environment" },
                    qrConfig,
                    onSuccess,
                    onError
                );

                resultDiv.innerText = "Сканер активний. Наведіть на код.";

                // Отримуємо відео-трек для керування ліхтариком
                const stream = html5QrCode
                    .getRunningTrackConstraints
                    ? null
                    : null;

                // Доступ до внутрішнього відеоелемента
                const videoElem = document.querySelector('#reader video');
                if (videoElem && videoElem.srcObject) {
                    const tracks = videoElem.srcObject.getVideoTracks();
                    if (tracks.length > 0) {
                        videoTrack = tracks[0];
                        const capabilities = videoTrack.getCapabilities();
                        if (capabilities.torch) {
                            torchSupported = true;
                            torchBtn.disabled = false;
                            torchBtn.style.display = 'inline-block';
                        } else {
                            // Ліхтарик не підтримується пристроєм
                            torchBtn.style.display = 'inline-block';
                            torchBtn.disabled = true;
                            torchBtn.title = 'Ліхтарик не підтримується цим пристроєм';
                        }
                    }
                } else {
                    // Затримка — дочекатись поки відео підключиться
                    setTimeout(checkTorchSupport, 1000);
                }

            } catch (err) {
                resultDiv.innerText = `❌ Помилка: ${err}`;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function checkTorchSupport() {
            const videoElem = document.querySelector('#reader video');
            if (videoElem && videoElem.srcObject) {
                const tracks = videoElem.srcObject.getVideoTracks();
                if (tracks.length > 0) {
                    videoTrack = tracks[0];
                    const capabilities = videoTrack.getCapabilities();
                    torchBtn.style.display = 'inline-block';
                    if (capabilities.torch) {
                        torchSupported = true;
                        torchBtn.disabled = false;
                    } else {
                        torchBtn.disabled = true;
                        torchBtn.title = 'Ліхтарик не підтримується цим пристроєм';
                    }
                }
            }
        }

        async function toggleTorch() {
            if (!torchSupported || !videoTrack) return;
            try {
                torchOn = !torchOn;
                await videoTrack.applyConstraints({
                    advanced: [{ torch: torchOn }]
                });
                if (torchOn) {
                    torchBtn.textContent = '🔦 Ліхтарик ВКЛ';
                    torchBtn.classList.add('active');
                } else {
                    torchBtn.textContent = '🔦 Ліхтарик';
                    torchBtn.classList.remove('active');
                }
            } catch (err) {
                resultDiv.innerText = `⚠️ Не вдалось керувати ліхтариком: ${err}`;
            }
        }

        async function stopScanner() {
            // Вимкнути ліхтарик перед зупинкою
            if (torchOn && videoTrack) {
                await videoTrack.applyConstraints({ advanced: [{ torch: false }] });
            }
            torchOn = false;
            torchSupported = false;
            videoTrack = null;

            await html5QrCode.stop();

            startBtn.disabled = false;
            stopBtn.disabled = true;
            torchBtn.disabled = true;
            torchBtn.style.display = 'none';
            torchBtn.textContent = '🔦 Ліхтарик';
            torchBtn.classList.remove('active');
            resultDiv.style.color = "";
            resultDiv.innerText = "Сканер зупинено.";
        }

        startBtn.addEventListener('click', startScanner);
        stopBtn.addEventListener('click', stopScanner);
        torchBtn.addEventListener('click', toggleTorch);
    </script>
</body>
</html>
